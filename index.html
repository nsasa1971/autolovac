<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoLovac PRO - Inspekcija i OBD2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --bg-spolja: #f8fafc;        
            --bg-kartica: #020617;       
            --bg-polja: #0f172a;         
            --ivica: #1e293b;            
            --zlatna-svetla: #fde047;
            --zlatna-srednja: #f59e0b;
            --zlatna-tamna: #b45309;
            --zelena: #10b981;    
            --zuta: #eab308;      
            --crvena: #ef4444;    
            --tekst-glavni: #f8fafc;
            --tekst-bledi: #94a3b8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-spolja);
            color: var(--tekst-glavni);
            margin: 0;
            padding: 20px 15px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        
        .kontejner {
            max-width: 500px;
            width: 100%;
            background: var(--bg-kartica);
            padding: 40px 30px;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid var(--ivica);
            box-sizing: border-box;
            position: relative;
        }
        
        .zaglavlje-sekcija { text-align: center; margin-bottom: 35px; }
        
        .ikona-kontejner {
            width: 70px;
            height: 70px;
            background: var(--bg-polja);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px auto;
            border: 1px solid var(--zlatna-tamna);
            box-shadow: 0 4px 15px -1px rgba(245, 158, 11, 0.2);
        }

        .ikona-kontejner i {
            font-size: 32px;
            background: linear-gradient(135deg, var(--zlatna-svetla), var(--zlatna-srednja));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        h1 { margin: 0 0 5px 0; font-size: 28px; font-weight: 800; letter-spacing: -0.5px; color: white; }
        .podnaslov { color: var(--tekst-bledi); margin: 0; font-size: 14px; font-weight: 500; }
        
        label { display: block; margin-top: 15px; margin-bottom: 8px; color: var(--tekst-bledi); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }

        select, input {
            width: 100%;
            padding: 16px;
            background: var(--bg-polja);
            color: white;
            border: 1px solid var(--ivica);
            border-radius: 16px;
            font-size: 16px;
            font-weight: 500;
            box-sizing: border-box;
            transition: all 0.2s;
            appearance: none;
        }
        select:focus, input:focus { border-color: var(--zlatna-srednja); outline: none; box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.1); }
        select:disabled { opacity: 0.4; }
        
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; text-align: center; font-size: 24px; font-weight: 700; color: var(--zelena); }
        
        #savet-boks {
            margin-top: 30px;
            padding: 20px;
            background: rgba(245, 158, 11, 0.05);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 16px;
            display: none;
        }
        #savet-boks h3 { margin: 0 0 10px 0; color: var(--zlatna-srednja); font-size: 15px; font-weight: 700; }
        #tekst-mane { font-size: 14px; line-height: 1.6; color: var(--tekst-glavni); margin: 0; }

        #cek-lista-modul { display: none; margin-top: 40px; }
        .kategorija-blok { margin-top: 30px; }
        
        .kategorija-naslov { 
            color: var(--zlatna-svetla); 
            font-size: 16px; 
            margin-bottom: 15px;
            font-weight: 700;
            border-bottom: 1px solid var(--ivica);
            padding-bottom: 8px;
        }
        
        .stavka {
            background: var(--bg-polja);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 15px;
            border: 1px solid var(--ivica);
        }
        .stavka-tekst { margin-bottom: 15px; font-weight: 500; font-size: 14px; color: var(--tekst-glavni); line-height: 1.5; }
        
        .opcije-grupa { display: flex; gap: 8px; }
        .btn-ocena {
            flex: 1;
            padding: 12px 0;
            border: 1px solid var(--ivica);
            border-radius: 9999px;
            font-weight: 700;
            font-size: 11px;
            cursor: pointer;
            background: transparent;
            color: var(--tekst-bledi);
            transition: all 0.2s;
        }
        
        .btn-ocena.ok.aktivno { background: var(--zelena); border-color: var(--zelena); color: white; }
        .btn-ocena.minus.aktivno { background: var(--zuta); border-color: var(--zuta); color: #000; }
        .btn-ocena.kriticno.aktivno { background: var(--crvena); border-color: var(--crvena); color: white; }

        /* NOVO: STILOVI ZA OBD SEKCIJU */
        .obd-unos-grupa { display: flex; gap: 10px; margin-bottom: 15px; }
        .obd-unos-grupa input { flex: 2; text-transform: uppercase; font-family: monospace; letter-spacing: 1px; font-size: 18px;}
        .obd-unos-grupa button { 
            flex: 1; 
            background: var(--bg-polja); 
            color: var(--zlatna-svetla); 
            border: 1px solid var(--zlatna-tamna); 
            border-radius: 16px; 
            font-weight: bold; 
            cursor: pointer;
            transition: 0.2s;
        }
        .obd-unos-grupa button:hover { background: rgba(245, 158, 11, 0.1); }
        
        .obd-stavka {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .obd-stavka-info { color: #fca5a5; font-size: 13px; }
        .obd-stavka-kod { font-weight: bold; color: white; font-size: 15px; margin-bottom: 3px; display: block;}
        .btn-obrisi-obd {
            background: transparent; border: none; color: var(--crvena); font-size: 18px; cursor: pointer;
        }

        .btn-glavno {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--zlatna-srednja), var(--zlatna-tamna));
            color: #fff;
            border: none;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s;
        }
        .btn-glavno:hover { filter: brightness(1.1); }

        #izvestaj-boks {
            display: none;
            margin-top: 20px;
            background: #000;
            padding: 20px;
            border-radius: 16px;
            border: 1px dashed var(--ivica);
        }
        #izvestaj-tekst { color: var(--zelena); font-family: monospace; white-space: pre-wrap; font-size: 13px; line-height: 1.5; }

        #cenkanje-bar {
            position: fixed;
            bottom: 25px;
            left: 0;
            right: 0;
            margin: 0 auto;
            max-width: 480px;
            width: 90%;
            background: linear-gradient(135deg, #fcd34d 0%, #f59e0b 50%, #d97706 100%);
            border: 1px solid #fde047;
            border-radius: 9999px;
            padding: 15px 25px;
            box-shadow: 0 15px 30px -5px rgba(217, 119, 6, 0.4);
            display: none;
            box-sizing: border-box;
            z-index: 1000;
        }
        .cenkanje-sadrzaj { display: flex; justify-content: space-between; align-items: center; }
        .cenkanje-sadrzaj span:first-child { font-size: 14px; color: #451a03; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        #finalna-cena { color: #451a03; font-size: 24px; font-weight: 900; }
    </style>
</head>
<body>

<div class="kontejner" style="margin-bottom: 120px;">
    
    <div class="zaglavlje-sekcija">
        <div class="ikona-kontejner">
            <i class="fa-solid fa-list-check"></i>
        </div>
        <h1>AutoLovac PRO</h1>
        <p class="podnaslov">Digitalni asistent za provjeru vozila</p>
    </div>

    <div class="unos-sekcija">
        <label for="cena-oglas">Početna cijena (€)</label>
        <input type="number" id="cena-oglas" value="5000" oninput="izracunajCenu()">

        <label for="marka">Marka vozila</label>
        <select id="marka" onchange="osveziModele()" disabled>
            <option value="">-- Učitavam bazu... --</option>
        </select>

        <label for="model">Model</label>
        <select id="model" onchange="osveziGodista()" disabled>
            <option value="">-- Prvo izaberite marku --</option>
        </select>

        <label for="godiste">Godište / Generacija</label>
        <select id="godiste" onchange="aktivirajPregled()" disabled>
            <option value="">-- Prvo izaberite model --</option>
        </select>
    </div>

    <div id="savet-boks">
        <h3><i class="fa-solid fa-triangle-exclamation" style="margin-right: 5px;"></i> Karakteristične mane:</h3>
        <p id="tekst-mane"></p>
    </div>

    <div id="cek-lista-modul">
        <div id="kategorije-kontejner"></div>
        
        <div class="kategorija-blok">
            <div class="kategorija-naslov"><i class="fa-solid fa-laptop-medical" style="margin-right: 8px;"></i> 5. OBD2 Dijagnostika</div>
            <div class="obd-unos-grupa">
                <input type="text" id="obd-unos" placeholder="Unesi kod (npr. P0400)">
                <button onclick="proveriOBDKod()">Upiši</button>
            </div>
            <div id="obd-lista"></div>
        </div>
        <button class="btn-glavno" onclick="generisiTekstualniIzvestaj()">
            <i class="fa-solid fa-file-invoice" style="margin-right: 8px;"></i> Napravi izvještaj pregovora
        </button>
        
        <div id="izvestaj-boks">
            <div id="izvestaj-tekst"></div>
            <button class="btn-glavno" style="background: var(--zelena); margin-top:15px; color: white; border:none;" onclick="kopirajTekst()">
                <i class="fa-solid fa-copy" style="margin-right: 8px;"></i> Kopiraj tekst u klipbord
            </button>
            
            <button class="btn-glavno" style="background: #3b82f6; margin-top:10px; color: white; border:none;" onclick="snimiUBazuOblaka()">
                <i class="fa-solid fa-cloud-arrow-up" style="margin-right: 8px;"></i> 💾 Sačuvaj izvještaj u bazu podataka
            </button>
        </div>
    </div>
</div>

<div id="cenkanje-bar">
    <div class="cenkanje-sadrzaj">
        <span>Konačna vrijednost:</span>
        <span id="finalna-cena">5000 €</span>
    </div>
</div>

<script>
    // ==========================================
    // PAŽNJA: OVDJE ZALIJEPI SVOJU KONFIGURACIJU IZ FIREBASE-a!
    const firebaseConfig = {
  apiKey: "AIzaSyBCl3LAUXyw47c81od5Gqcb3FAIexysQBw",
  authDomain: "autolovac-pro.firebaseapp.com",
  projectId: "autolovac-pro",
  storageBucket: "autolovac-pro.firebasestorage.app",
  messagingSenderId: "118844372336",
  appId: "1:118844372336:web:9d245372932bf4e9840bb5"
};

    // ==========================================

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let bazaMane = {};
    let pocetnaCena = 5000;
    let iznosSustinskogOdbitka = 0;
    
    // BAZA OBD2 GREŠAKA SA PROCJENJENIM TROŠKOM
    const obdBaza = {
        "P0400": { opis: "EGR ventil - Greška u protoku", cena: 150 },
        "P0234": { opis: "Turbina - Overboost (Prepunjavanje, prljavo krilce)", cena: 250 },
        "P0101": { opis: "MAF senzor (Protokomjer) van granica", cena: 100 },
        "P0300": { opis: "Izostanak paljenja na više cilindara (Sjećice/Bobine)", cena: 150 },
        "P2002": { opis: "DPF filter - Efikasnost ispod granice (Zapušen)", cena: 350 },
        "P0087": { opis: "Pritisak goriva prenizak (Pumpa visokog pritiska/Dizne)", cena: 450 },
        "P0340": { opis: "Senzor bregaste osovine - Kvar u krugu", cena: 80 }
    };
    
    let aktivniOBDKodovi = [];

    const strukturaCekListe = {
        "1. Spoljašnost i Limarija": [
            { id: "zazori", tekst: "Zazori na haubi i vratima (Tragovi udesa / farbanja)", kazna: 500 },
            { id: "rdja", tekst: "Korozija na pragovima, rubovima zadnjih točkova i patosu", kazna: 600 },
            { id: "stakla", tekst: "Pukotine na šoferšajbni ili različita godišta na staklima", kazna: 200 },
            { id: "gume", tekst: "Stanje i starost guma (DOT broj) i oštećenja felni", kazna: 350 }
        ],
        "2. Enterijer i Elektronika": [
            { id: "klima", tekst: "Kompresor klime ne pali ili ne hladi / greje ravnomerno", kazna: 250 },
            { id: "potrosenost", tekst: "Pohabanost volana i sedišta ne odgovara kilometraži", kazna: 150 },
            { id: "elektronika", tekst: "Ne rade podizači, centralna brava ili gori lampica (Check Engine/Airbag)", kazna: 200 }
        ],
        "3. Motorni Prostor": [
            { id: "ulje", tekst: "Sveži tragovi ulja na bloku motora i ispod turbine", kazna: 300 },
            { id: "tecnosti", tekst: "Emulzija (majonez) na čepu za ulje ili ulje u antifrizu", kazna: 700 },
            { id: "auspuh", tekst: "Crni, plavi ili gusti beli dim iz auspuha pri dodavanju gasa", kazna: 500 }
        ],
        "4. Probna Vožnja": [
            { id: "trap", tekst: "Tupi udarci i lupkanje na trapu pri prelasku preko rupa", kazna: 250 },
            { id: "kvacilo", tekst: "Zamajac trese pri polasku, krčanje sinhrona u menjaču", kazna: 500 }
        ]
    };

    let stanjeStavki = {};

    const markaSelect = document.getElementById("marka");
    const modelSelect = document.getElementById("model");
    const godisteSelect = document.getElementById("godiste");
    const savetBoks = document.getElementById("savet-boks");
    const tekstMane = document.getElementById("tekst-mane");
    const cekListaModul = document.getElementById("cek-lista-modul");
    const kategorijeKontejner = document.getElementById("kategorije-kontejner");
    const cenkanjeBar = document.getElementById("cenkanje-bar");
    const finalnaCenaTxt = document.getElementById("finalna-cena");
    const izvestajBoks = document.getElementById("izvestaj-boks");
    const izvestajTekst = document.getElementById("izvestaj-tekst");

    async function ucitajBazu() {
        try {
            const odgovor = await fetch('baza.json');
            bazaMane = await odgovor.json();
            
            markaSelect.innerHTML = '<option value="">-- Izaberite --</option>';
            Object.keys(bazaMane).forEach(marka => {
                const opcija = document.createElement("option");
                opcija.value = marka; opcija.textContent = marka;
                markaSelect.appendChild(opcija);
            });
            markaSelect.disabled = false;
        } catch (greska) {
            console.error("Greška:", greska);
        }
    }
    ucitajBazu();

    function osveziModele() {
        const izabranaMarka = markaSelect.value;
        modelSelect.innerHTML = '<option value="">-- Izaberite --</option>';
        godisteSelect.innerHTML = '<option value="">-- Izaberite --</option>';
        godisteSelect.disabled = true;
        resetujEkran();
        if (izabranaMarka === "") { modelSelect.disabled = true; return; }
        Object.keys(bazaMane[izabranaMarka]).forEach(model => {
            const opcija = document.createElement("option");
            opcija.value = model; opcija.textContent = model;
            modelSelect.appendChild(opcija);
        });
        modelSelect.disabled = false;
    }

    function osveziGodista() {
        const izabranaMarka = markaSelect.value;
        const izabraniModel = modelSelect.value;
        godisteSelect.innerHTML = '<option value="">-- Izaberite --</option>';
        resetujEkran();
        if (izabraniModel === "") { godisteSelect.disabled = true; return; }
        Object.keys(bazaMane[izabranaMarka][izabraniModel]).forEach(god => {
            const opcija = document.createElement("option");
            opcija.value = god; opcija.textContent = god;
            godisteSelect.appendChild(opcija);
        });
        godisteSelect.disabled = false;
    }

    function resetujEkran() {
        savetBoks.style.display = "none";
        cekListaModul.style.display = "none";
        cenkanjeBar.style.display = "none";
        izvestajBoks.style.display = "none";
        aktivniOBDKodovi = []; // Resetovanje OBD kodova
        osveziOBDListuUI();
    }

    function aktivirajPregled() {
        const izabranaMarka = markaSelect.value;
        const izabraniModel = modelSelect.value;
        const izabranoGodiste = godisteSelect.value;
        if (izabranoGodiste === "") { resetujEkran(); return; }

        tekstMane.textContent = bazaMane[izabranaMarka][izabraniModel][izabranoGodiste];
        savetBoks.style.display = "block";

        iscrtajKategorisaniMeni();
        cekListaModul.style.display = "block";
        cenkanjeBar.style.display = "block";
        izracunajCenu();
    }

    function iscrtajKategorisaniMeni() {
        kategorijeKontejner.innerHTML = "";
        stanjeStavki = {}; 

        Object.keys(strukturaCekListe).forEach(imeKat => {
            const katBlok = document.createElement("div");
            katBlok.className = "kategorija-blok";
            katBlok.innerHTML = `<div class="kategorija-naslov">${imeKat}</div>`;

            strukturaCekListe[imeKat].forEach(st => {
                stanjeStavki[st.id] = { tekst: st.tekst, status: "OK", odbitak: 0 };

                const stavkaDiv = document.createElement("div");
                stavkaDiv.className = "stavka";
                stavkaDiv.innerHTML = `
                    <div class="stavka-tekst">${st.tekst}</div>
                    <div class="opcije-grupa">
                        <button class="btn-ocena ok aktivno" onclick="oceniStavku('${st.id}', 'OK', this, 0)">OK</button>
                        <button class="btn-ocena minus" onclick="oceniStavku('${st.id}', 'MINUS', this, ${st.kazna})">MANA</button>
                        <button class="btn-ocena kriticno" onclick="oceniStavku('${st.id}', 'KRITIČNO', this, ${st.kazna * 1.5})">KATASTROFA</button>
                    </div>
                `;
                katBlok.appendChild(stavkaDiv);
            });
            kategorijeKontejner.appendChild(katBlok);
        });
    }

    function oceniStavku(id, status, dugme, odbitak) {
        const roditelj = dugme.parentElement;
        roditelj.querySelectorAll('.btn-ocena').forEach(b => b.classList.remove('aktivno'));
        dugme.classList.add('aktivno');

        stanjeStavki[id].status = status;
        stanjeStavki[id].odbitak = odbitak;
        izracunajCenu();
    }

    // OBD FUNKCIJE
    function proveriOBDKod() {
        let unosPolje = document.getElementById("obd-unos");
        let kod = unosPolje.value.toUpperCase().trim();
        
        if (!kod) return;
        
        if (aktivniOBDKodovi.some(k => k.kod === kod)) {
            alert("Ovaj OBD kod je već dodat u listu!");
            unosPolje.value = "";
            return;
        }

        if (obdBaza[kod]) {
            aktivniOBDKodovi.push({
                kod: kod,
                opis: obdBaza[kod].opis,
                kazna: obdBaza[kod].cena
            });
        } else {
            // Ako kod nije u bazi, dodajemo ga sa generičkom cenom od 50€ da ipak ostane zabeležen
            aktivniOBDKodovi.push({
                kod: kod,
                opis: "Nespecifikovana greška na modulu",
                kazna: 50
            });
        }
        
        unosPolje.value = "";
        osveziOBDListuUI();
        izracunajCenu();
    }

    function obrisiOBD(index) {
        aktivniOBDKodovi.splice(index, 1);
        osveziOBDListuUI();
        izracunajCenu();
    }

    function osveziOBDListuUI() {
        let kontejner = document.getElementById("obd-lista");
        kontejner.innerHTML = "";
        
        aktivniOBDKodovi.forEach((stavka, index) => {
            let div = document.createElement("div");
            div.className = "obd-stavka";
            div.innerHTML = `
                <div>
                    <span class="obd-stavka-kod">${stavka.kod} (-${stavka.kazna}€)</span>
                    <span class="obd-stavka-info">${stavka.opis}</span>
                </div>
                <button class="btn-obrisi-obd" onclick="obrisiOBD(${index})"><i class="fa-solid fa-xmark"></i></button>
            `;
            kontejner.appendChild(div);
        });
    }

    // AŽURIRANA KALKULACIJA
    function izracunajCenu() {
        const unosCene = document.getElementById("cena-oglas").value;
        pocetnaCena = unosCene ? parseFloat(unosCene) : 0;
        
        iznosSustinskogOdbitka = 0;
        
        // Sabiranje mana sa ček liste
        Object.keys(stanjeStavki).forEach(id => {
            iznosSustinskogOdbitka += stanjeStavki[id].odbitak;
        });
        
        // Sabiranje OBD kazni
        aktivniOBDKodovi.forEach(obd => {
            iznosSustinskogOdbitka += obd.kazna;
        });

        let finalnaCena = pocetnaCena - iznosSustinskogOdbitka;
        if (finalnaCena < 0) finalnaCena = 0;

        finalnaCenaTxt.textContent = Math.round(finalnaCena) + " €";
        
        if (izvestajBoks.style.display === "block") {
            osveziSamoTekstIzvestaja();
        }
    }

    function osveziSamoTekstIzvestaja() {
        const marka = markaSelect.value;
        const model = modelSelect.value;
        const godiste = godisteSelect.value;
        let danas = new Date().toLocaleDateString('bs-BA');
        
        let tekst = `=== AUTOLOVAC PRO ===\n`;
        tekst += `Datum: ${danas}\n`;
        tekst += `Vozilo: ${marka} ${model} (${godiste})\n`;
        tekst += `Početna cena: ${pocetnaCena} €\n`;
        tekst += `--------------------------\n`;
        tekst += `PRONAĐENE MANE:\n`;
        
        let brojacMana = 0;
        
        // Upis OBD grešaka u tekst
        if (aktivniOBDKodovi.length > 0) {
            tekst += `[OBD2 DIJAGNOSTIKA]\n`;
            aktivniOBDKodovi.forEach(obd => {
                brojacMana++;
                tekst += `- Greška ${obd.kod}: ${obd.opis} (-${obd.kazna} €)\n`;
            });
            tekst += `\n`;
        }

        // Upis ostalih grešaka
        Object.keys(stanjeStavki).forEach(id => {
            let st = stanjeStavki[id];
            if (st.status !== "OK") {
                brojacMana++;
                tekst += `- [${st.status}] ${st.tekst} (-${Math.round(st.odbitak)} €)\n`;
            }
        });
        
        if (brojacMana === 0) {
            tekst += `Vozilo je u odličnom stanju.\n`;
        }
        
        tekst += `--------------------------\n`;
        tekst += `REALNA VREDNOST: ${Math.round(pocetnaCena - iznosSustinskogOdbitka)} €\n`;
        
        izvestajTekst.textContent = tekst;
    }

    function generisiTekstualniIzvestaj() {
        osveziSamoTekstIzvestaja(); 
        izvestajBoks.style.display = "block"; 
        izvestajBoks.scrollIntoView({ behavior: 'smooth' }); 
    }

    function kopirajTekst() {
        const tekst = izvestajTekst.textContent;
        navigator.clipboard.writeText(tekst).then(() => {
            alert("Izvještaj je uspješno kopiran!");
        });
    }

    function snimiUBazuOblaka() {
        const marka = markaSelect.value;
        const model = modelSelect.value;
        const godiste = godisteSelect.value;
        
        let podaciZaSlanje = {
            datum: new Date().toLocaleDateString('bs-BA'),
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
            marka: marka,
            model: model,
            godiste: godiste,
            pocetnaCena: pocetnaCena,
            ulaganja: iznosSustinskogOdbitka,
            finalnaCena: pocetnaCena - iznosSustinskogOdbitka,
            detaljiMana: {},
            obdKodovi: aktivniOBDKodovi // Dodati kodovi u bazu
        };

        Object.keys(stanjeStavki).forEach(id => {
            if (stanjeStavki[id].status !== "OK") {
                podaciZaSlanje.detaljiMana[id] = stanjeStavki[id].status;
            }
        });

        db.collection("inspekcije").add(podaciZaSlanje)
        .then(() => {
            alert("✅ Izvještaj je uspješno trajno zabilježen u bazu podataka!");
        })
        .catch((error) => {
            console.error("Greška pri upisu u bazu: ", error);
            alert("Došlo je do greške pri povezivanju sa bazom.");
        });
    }
</script>
