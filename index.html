<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoLovac PRO - Premium Ček-Lista</title>
    <style>
        :root {
            --bg-glavna: #0a0a0c;
            --bg-kartica: #13131a;
            --bg-input: #1c1c24;
            --plava: #3498db;
            --plava-hover: #2980b9;
            --zelena: #2ecc71;
            --zuta: #f1c40f;
            --crvena: #e74c3c;
            --tekst-glavni: #ffffff;
            --tekst-sekundarni: #94a3b8;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background-color: var(--bg-glavna);
            color: var(--tekst-glavni);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }
        
        .kontejner {
            max-width: 550px;
            width: 100%;
            background: var(--bg-kartica);
            padding: 30px 20px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border: 1px solid #22222f;
            box-sizing: border-box;
        }
        
        h1 { 
            text-align: center; 
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px; 
            font-size: 32px; 
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        
        .podnaslov { text-align: center; color: var(--tekst-sekundarni); margin-top: 0; margin-bottom: 30px; font-size: 14px; font-weight: 500; }
        
        .grupa-polja {
            background: #181822;
            padding: 15px;
            border-radius: 16px;
            border: 1px solid #222232;
            margin-bottom: 20px;
        }

        label { display: block; margin-top: 12px; margin-bottom: 6px; color: var(--tekst-sekundarni); font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
        label:first-child { margin-top: 0; }

        select, input {
            width: 100%;
            padding: 14px;
            background: var(--bg-input);
            color: #fff;
            border: 1px solid #2d2d3d;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }
        select:focus, input:focus { border-color: var(--plava); box-shadow: 0 0 0 3px rgba(52,152,219,0.2); outline: none; }
        select:disabled { opacity: 0.3; cursor: not-allowed; }
        
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; text-align: center; font-size: 20px; font-weight: 700; color: var(--zelena); letter-spacing: 0.5px; }
        
        #savet-boks {
            margin-top: 25px;
            padding: 20px;
            background: linear-gradient(135deg, #241c08 0%, #1a1405 100%);
            border-left: 4px solid var(--zuta);
            border-radius: 12px;
            display: none;
            border-top: 1px solid #3a3010;
            border-right: 1px solid #3a3010;
            border-bottom: 1px solid #3a3010;
        }
        #savet-boks h3 { margin-top: 0; color: var(--zuta); font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
        #tekst-mane { font-size: 15px; line-height: 1.6; color: #e2e8f0; margin: 0; }

        #cek-lista-modul { display: none; margin-top: 35px; }
        .kategorija-blok { margin-top: 30px; }
        
        .kategorija-naslov { 
            color: var(--plava); 
            font-size: 18px; 
            border-bottom: 1px solid #222235; 
            padding-bottom: 8px; 
            margin-bottom: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        
        .stavka {
            background: #181822;
            padding: 18px;
            border-radius: 16px;
            margin-bottom: 14px;
            border: 1px solid #222232;
        }
        .stavka-tekst { margin-bottom: 14px; font-weight: 600; font-size: 15px; color: #f8fafc; line-height: 1.4; }
        
        .opcije-grupa { display: flex; gap: 8px; }
        .btn-ocena {
            flex: 1;
            padding: 12px 4px;
            border: 1px solid #2d2d3d;
            border-radius: 10px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            background: var(--bg-input);
            color: #94a3b8;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-ocena:active { transform: scale(0.97); }
        
        .btn-ocena.ok:hover, .btn-ocena.ok.aktivno { background: var(--zelena); border-color: var(--zelena); color: #fff; box-shadow: 0 4px 12px rgba(46,204,113,0.25); }
        .btn-ocena.minus:hover, .btn-ocena.minus.aktivno { background: var(--zuta); border-color: var(--zuta); color: #000; box-shadow: 0 4px 12px rgba(241,196,15,0.25); }
        .btn-ocena.kriticno:hover, .btn-ocena.kriticno.aktivno { background: var(--crvena); border-color: var(--crvena); color: #fff; box-shadow: 0 4px 12px rgba(231,76,60,0.25); }

        .btn-glavno {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--plava) 0%, #2575fc 100%);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 4px 15px rgba(52,152,219,0.3);
            transition: all 0.2s;
        }
        .btn-glavno:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(52,152,219,0.4); }
        .btn-glavno:active { transform: translateY(1px); }

        #izvestaj-boks {
            display: none;
            margin-top: 30px;
            background: #111118;
            padding: 22px;
            border-radius: 16px;
            border: 1px dashed #333345;
        }
        #izvestaj-tekst {
            background: #07070a;
            color: #a7f3d0;
            padding: 18px;
            border-radius: 10px;
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
            white-space: pre-wrap;
            font-size: 13px;
            line-height: 1.6;
            border: 1px solid #1e1e2f;
        }

        #cenkanje-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(22, 22, 26, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid #222235;
            padding: 18px 20px;
            text-align: center;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
            display: none;
            box-sizing: border-box;
            z-index: 1000;
        }
        .cenkanje-sadrzaj {
            max-width: 550px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .cenkanje-sadrzaj span:first-child { font-size: 15px; color: var(--tekst-sekundarni); font-weight: 600; }
        #finalna-cena { color: var(--zelena); font-size: 26px; font-weight: 800; text-shadow: 0 0 15px rgba(46,204,113,0.2); }
    </style>
</head>
<body>

<div class="kontejner" style="margin-bottom: 120px;">
    <h1>🚗 AutoLovac PRO</h1>
    <p class="podnaslov">Inteligentni vodič za proveri vozila</p>

    <div class="grupa-polja">
        <label for="cena-oglas">Početna cena na oglasu (€):</label>
        <input type="number" id="cena-oglas" value="5000" oninput="izracunajCenu()">

        <label for="marka">Marka:</label>
        <select id="marka" onchange="osveziModele()" disabled>
            <option value="">-- Učitavam bazu... --</option>
        </select>

        <label for="model">Model:</label>
        <select id="model" onchange="osveziGodista()" disabled>
            <option value="">-- Prvo izaberite marku --</option>
        </select>

        <label for="godiste">Godište / Generacija:</label>
        <select id="godiste" onchange="aktivirajPregled()" disabled>
            <option value="">-- Prvo izaberite model --</option>
        </select>
    </div>

    <div id="savet-boks">
        <h3>⚠️ Karakteristične fabričke mane:</h3>
        <p id="tekst-mane"></p>
    </div>

    <div id="cek-lista-modul">
        <div id="kategorije-kontejner"></div>
        
        <button class="btn-glavno" onclick="generisiTekstualniIzvestaj()">📋 Generiši izveštaj za klijenta</button>
        
        <div id="izvestaj-boks">
            <h3 style="margin-top:0; color:var(--plava); font-size: 16px;">Spreman tekst za slanje:</h3>
            <div id="izvestaj-tekst"></div>
            <button class="btn-glavno" style="background: linear-gradient(135deg, var(--zelena) 0%, #2196f3 100%); margin-top:12px; box-shadow: 0 4px 12px rgba(46,204,113,0.2);" onclick="kopirajTekst()">📋 Kopiraj u klipbord</button>
        </div>
    </div>
</div>

<div id="cenkanje-bar">
    <div class="cenkanje-sadrzaj">
        <span>Realna vrednost nakon mana:</span>
        <span id="finalna-cena">5000 €</span>
    </div>
</div>

<script>
    let bazaMane = {};
    let pocetnaCena = 5000;
    let iznosSustinskogOdbitka = 0;
    
    const strukturaCekListe = {
        "1. Spoljašnost i Karoserija": [
            { id: "zazori", tekst: "Simetrija zazora (hauba, krila, vrata) — tragovi havarija", kazna: 450 },
            { id: "gume", tekst: "Stanje guma i starost (DOT) — izlizanost gaznog sloja", kazna: 300 }
        ],
        "2. Enterijer i Kabinska Oprema": [
            { id: "klima", tekst: "Ispravnost kompresora klime i svih smerova duvanja", kazna: 200 },
            { id: "potrosenost", tekst: "Istrošenost enterijera (volan, sedišta) u odnosu na km", kazna: 100 }
        ],
        "3. Pogonski Agregat (Motor)": [
            { id: "ulje", tekst: "Tragovi curenja ulja na motoru, dihtunzima i plastici", kazna: 250 },
            { id: "tečnosti", tekst: "Čistoća antifriza (odsustvo uljnih mrlja/emulzije u posudi)", kazna: 600 }
        ],
        "4. Dinamička Provera (Vožnja)": [
            { id: "trap", tekst: "Odsustvo lupkanja, zveckanja i nepravilnih zvukova na trapu", kazna: 250 },
            { id: "kvacilo", tekst: "Tvrdoća pedale kvačila, treskanje pri kretanju (zamajac)", kazna: 450 }
        ]
    };

    let stanjeStavki = {};

    const markaSelect = document.getElementById("marka");
    const modelSelect = document.getElementById("model");
    const godisteSelect = document.getElementById("godiste");
    const savetBoks = document.getElementById("savet-boks");
    const tekstMane = document.getElementById("tekst-mane");
    const cekListaModul = document.getElementById("cek-lista-modul");
    const kategorijeKontejner = document.getElementById("kategorije-kontejner");
    const cenkanjeBar = document.getElementById("cenkanje-bar");
    const finalnaCenaTxt = document.getElementById("finalna-cena");
    const izvestajBoks = document.getElementById("izvestaj-boks");
    const izvestajTekst = document.getElementById("izvestaj-tekst");

    async function ucitajBazu() {
        try {
            const odgovor = await fetch('baza.json');
            bazaMane = await odgovor.json();
            
            markaSelect.innerHTML = '<option value="">-- Izaberite marku --</option>';
            Object.keys(bazaMane).forEach(marka => {
                const opcija = document.createElement("option");
                opcija.value = marka; opcija.textContent = marka;
                markaSelect.appendChild(opcija);
            });
            markaSelect.disabled = false;
        } catch (greska) {
            console.error("Greška:", greska);
        }
    }
    ucitajBazu();

    function osveziModele() {
        const izabranaMarka = markaSelect.value;
        modelSelect.innerHTML = '<option value="">-- Izaberite model --</option>';
        godisteSelect.innerHTML = '<option value="">-- Prvo izaberite model --</option>';
        godisteSelect.disabled = true;
        resetujEkran();
        if (izabranaMarka === "") { modelSelect.disabled = true; return; }
        Object.keys(bazaMane[izabranaMarka]).forEach(model => {
            const opcija = document.createElement("option");
            opcija.value = model; opcija.textContent = model;
            modelSelect.appendChild(opcija);
        });
        modelSelect.disabled = false;
    }

    function osveziGodista() {
        const izabranaMarka = markaSelect.value;
        const izabraniModel = modelSelect.value;
        godisteSelect.innerHTML = '<option value="">-- Izaberite godište --</option>';
        resetujEkran();
        if (izabraniModel === "") { godisteSelect.disabled = true; return; }
        Object.keys(bazaMane[izabranaMarka][izabraniModel]).forEach(god => {
            const opcija = document.createElement("option");
            opcija.value = god; opcija.textContent = god;
            godisteSelect.appendChild(opcija);
        });
        godisteSelect.disabled = false;
    }

    function resetujEkran() {
        savetBoks.style.display = "none";
        cekListaModul.style.display = "none";
        cenkanjeBar.style.display = "none";
        izvestajBoks.style.display = "none";
    }

    function aktivirajPregled() {
        const izabranaMarka = markaSelect.value;
        const izabraniModel = modelSelect.value;
        const izabranoGodiste = godisteSelect.value;
        if (izabranoGodiste === "") { resetujEkran(); return; }

        tekstMane.textContent = bazaMane[izabranaMarka][izabraniModel][izabranoGodiste];
        savetBoks.style.display = "block";

        iscrtajKategorisaniMeni();
        cekListaModul.style.display = "block";
        cenkanjeBar.style.display = "block";
        izracunajCenu();
    }

    function iscrtajKategorisaniMeni() {
        kategorijeKontejner.innerHTML = "";
        stanjeStavki = {}; 

        Object.keys(strukturaCekListe).forEach(imeKat => {
            const katBlok = document.createElement("div");
            katBlok.className = "kategorija-blok";
            katBlok.innerHTML = `<div class="kategorija-naslov">${imeKat}</div>`;

            strukturaCekListe[imeKat].forEach(st => {
                stanjeStavki[st.id] = { tekst: st.tekst, status: "OK", odbitak: 0 };

                const stavkaDiv = document.createElement("div");
                stavkaDiv.className = "stavka";
                stavkaDiv.innerHTML = `
                    <div class="stavka-tekst">${st.tekst}</div>
                    <div class="opcije-grupa">
                        <button class="btn-ocena ok aktivno" onclick="oceniStavku('${st.id}', 'OK', this, 0)">🟢 OK</button>
                        <button class="btn-ocena minus" onclick="oceniStavku('${st.id}', 'MINUS', this, ${st.kazna})">🟡 MINUS</button>
                        <button class="btn-ocena kriticno" onclick="oceniStavku('${st.id}', 'KRITIČNO', this, ${st.kazna * 1.8})">🔴 KRITIČNO</button>
                    </div>
                `;
                katBlok.appendChild(stavkaDiv);
            });
            kategorijeKontejner.appendChild(katBlok);
        });
    }

    function oceniStavku(id, status, dugme, odbitak) {
        const roditelj = dugme.parentElement;
        roditelj.querySelectorAll('.btn-ocena').forEach(b => b.classList.remove('aktivno'));
        dugme.classList.add('aktivno');

        stanjeStavki[id].status = status;
        stanjeStavki[id].odbitak = odbitak;
        izracunajCenu();
    }

    function izracunajCenu() {
        const unosCene = document.getElementById("cena-oglas").value;
        pocetnaCena = unosCene ? parseFloat(unosCene) : 0;
        
        iznosSustinskogOdbitka = 0;
        Object.keys(stanjeStavki).forEach(id => {
            iznosSustinskogOdbitka += stanjeStavki[id].odbitak;
        });

        let finalnaCena = pocetnaCena - iznosSustinskogOdbitka;
        if (finalnaCena < 0) finalnaCena = 0;

        finalnaCenaTxt.textContent = Math.round(finalnaCena) + " €";
    }

    function generisiTekstualniIzvestaj() {
        const marka = markaSelect.value;
        const model = modelSelect.value;
        const godiste = godisteSelect.value;
        let danas = new Date().toLocaleDateString('sr-RS');
        
        let tekst = `=== AUTOLOVAC PRO REPORT ===\n`;
        tekst += `Datum pregleda: ${danas}\n`;
        tekst += `Vozilo: ${marka} ${model} (${godiste})\n`;
        tekst += `Početna cena: ${pocetnaCena} €\n`;
        tekst += `----------------------------------------\n`;
        tekst += `DETALjAN PREGLED MANA:\n`;
        
        let brojacMana = 0;
        Object.keys(stanjeStavki).forEach(id => {
            let st = stanjeStavki[id];
            if (st.status !== "OK") {
                brojacMana++;
                tekst += `⚠️ [${st.status}] ${st.tekst} (-${Math.round(st.odbitak)} €)\n`;
            }
        });
        
        if (brojacMana === 0) {
            tekst += `✅ Nisu pronađene značajne tehničke mane na pregledu.\n`;
        }
        
        tekst += `----------------------------------------\n`;
        tekst += `Ukupna procenjena ulaganja: ${Math.round(iznosSustinskogOdbitka)} €\n`;
        tekst += `💰 PREDLOG ZA CENKANJE: ${Math.round(pocetnaCena - iznosSustinskogOdbitka)} €\n`;
        tekst += `========================================`;
        
        izvestajTekst.textContent = tekst;
        izvestajBoks.style.display = "block";
        izvestajBoks.scrollIntoView({ behavior: 'smooth' });
    }

    function kopirajTekst() {
        const tekst = izvestajTekst.textContent;
        navigator.clipboard.writeText(tekst).then(() => {
            alert("Izveštaj uspešno kopiran u klipbord! Spreman je za slanje.");
        }).catch(err => {
            console.error('Greška pri kopiranju: ', err);
        });
    }
</script>

</body>
</html>
